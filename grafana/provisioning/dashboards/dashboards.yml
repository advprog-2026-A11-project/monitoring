apiVersion: 1

providers:
  - name: Local Dashboards
    orgId: 1
    folder: Microservices
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards/microservices

  - name: Forum Monitoring Dashboards
    orgId: 1
    folder: Forum Monitoring
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards/forum-monitoring

  - name: Auth Monitoring Dashboards
    orgId: 1
    folder: Auth Monitoring
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards/auth-monitoring

  - name: Achievement Monitoring Dashboards
    orgId: 1
    folder: Achievement Monitoring
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards/achievement-monitoring
