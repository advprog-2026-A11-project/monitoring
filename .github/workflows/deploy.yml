name: Deploy

on:
  push:
    branches: [main]
  

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Generate immutable image tag
        id: image-tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE_TAG="$(date -u +%Y%m%d)"
          VERSION_TAG="v${DATE_TAG}-${SHORT_SHA}"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "Using image tag: $VERSION_TAG"
      - name: Log in to Docker Hub
        uses: docker/login-action@62216b50636a8c8c25d246437857ed84232019ca
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318
        with:
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_MONITORING_REPO_NAME }}:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_MONITORING_REPO_NAME }}:${{ steps.image-tag.outputs.version_tag }}
      - name: Copy docker-compose.yml and Dockerfile to server
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.SSH_USERNAME }}/app"
      - name: Releasing New Version
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: DOCKER_HUB_ACCESS_TOKEN,DOCKER_HUB_USERNAME,DOCKER_HUB_MONITORING_REPO_NAME,VERSION_TAG
          script: |
            cd /home/${{ secrets.SSH_USERNAME }}/app
            docker compose down || true
            echo "$DOCKER_HUB_ACCESS_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
            docker pull "$DOCKER_HUB_USERNAME/$DOCKER_HUB_MONITORING_REPO_NAME:$VERSION_TAG"
            docker compose up -d
            docker ps
        env:
          DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_MONITORING_REPO_NAME: ${{ secrets.DOCKER_HUB_MONITORING_REPO_NAME }}
          VERSION_TAG: ${{ steps.image-tag.outputs.version_tag }}
